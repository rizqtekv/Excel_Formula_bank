<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excel Formula Book</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
:root,[data-theme="light"]{
  --color-bg:#f4f6f9;--color-surface:#ffffff;--color-surface-2:#f8fafc;
  --color-surface-offset:#eef1f5;--color-border:#e2e8f0;--color-divider:#d1d9e0;
  --color-text:#1a202c;--color-text-muted:#64748b;--color-text-faint:#94a3b8;
  --color-primary:#1d6fa4;--color-primary-hover:#155e8e;--color-primary-hl:#dbeafe;
  --color-success:#166534;--color-success-bg:#dcfce7;
  --color-teal:#0f766e;--color-teal-bg:#ccfbf1;
  --shadow:rgba(0,0,0,.08);--shadow-md:rgba(0,0,0,.14);
  --radius-sm:6px;--radius-md:10px;--radius-lg:14px;--radius-full:9999px;
  --font-body:'Inter',system-ui,sans-serif;--font-code:'Fira Code',monospace;
  --tr:180ms cubic-bezier(.16,1,.3,1);
}
[data-theme="dark"]{
  --color-bg:#0f1117;--color-surface:#1a1d27;--color-surface-2:#1e2132;
  --color-surface-offset:#252836;--color-border:#2d3148;--color-divider:#353a52;
  --color-text:#e8ecf4;--color-text-muted:#8892aa;--color-text-faint:#545e78;
  --color-primary:#60a5fa;--color-primary-hover:#93c5fd;--color-primary-hl:#1e3a5f;
  --color-success:#4ade80;--color-success-bg:#14532d;
  --color-teal:#2dd4bf;--color-teal-bg:#042f2e;
  --shadow:rgba(0,0,0,.3);--shadow-md:rgba(0,0,0,.5);
}
@media(prefers-color-scheme:dark){:root:not([data-theme]){
  --color-bg:#0f1117;--color-surface:#1a1d27;--color-surface-2:#1e2132;
  --color-surface-offset:#252836;--color-border:#2d3148;--color-text:#e8ecf4;
  --color-text-muted:#8892aa;--color-primary:#60a5fa;--color-primary-hl:#1e3a5f;
}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:var(--font-body);background:var(--color-bg);color:var(--color-text);min-height:100dvh;line-height:1.6}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
input,select{font:inherit;color:inherit}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100;background:var(--color-surface);border-bottom:1px solid var(--color-border);box-shadow:0 2px 12px var(--shadow);padding:0 20px}
.hdr-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;gap:14px;height:60px}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--color-text);flex-shrink:0}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#1d6fa4,#0ea5e9);border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-txt{font-size:.9375rem;font-weight:700;letter-spacing:-.02em;white-space:nowrap}
.logo-txt span{color:var(--color-primary)}
.srch-wrap{flex:1;max-width:500px;position:relative}
.srch-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--color-text-faint);pointer-events:none;width:15px;height:15px}
.srch-input{width:100%;padding:8px 12px 8px 34px;background:var(--color-surface-offset);border:1.5px solid var(--color-border);border-radius:var(--radius-full);font-size:.875rem;outline:none;transition:border-color var(--tr),box-shadow var(--tr)}
.srch-input:focus{border-color:var(--color-primary);box-shadow:0 0 0 3px var(--color-primary-hl)}
.srch-input::placeholder{color:var(--color-text-faint)}
.hdr-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.cnt-badge{font-size:.75rem;font-weight:600;background:var(--color-primary-hl);color:var(--color-primary);padding:3px 10px;border-radius:var(--radius-full);white-space:nowrap}
.theme-btn{width:34px;height:34px;border-radius:50%;background:var(--color-surface-offset);border:1px solid var(--color-border);display:flex;align-items:center;justify-content:center;color:var(--color-text-muted);transition:background var(--tr)}
.theme-btn:hover{background:var(--color-border)}

/* HERO */
.hero{background:linear-gradient(135deg,#1d4ed8 0%,#0ea5e9 55%,#0d9488 100%);padding:32px 20px;text-align:center;color:#fff}
.hero h1{font-size:clamp(1.4rem,3vw,2.1rem);font-weight:800;letter-spacing:-.03em;margin-bottom:7px}
.hero p{font-size:.9rem;opacity:.88;max-width:540px;margin:0 auto}
.hero-stats{display:flex;justify-content:center;gap:28px;margin-top:18px;flex-wrap:wrap}
.stat-num{display:block;font-size:1.4rem;font-weight:800}
.stat-lbl{font-size:.7rem;opacity:.75;text-transform:uppercase;letter-spacing:.06em}

/* FILTERS */
.filters-wrap{background:var(--color-surface);border-bottom:1px solid var(--color-border);padding:14px 20px;position:sticky;top:60px;z-index:90}
.filters-inner{max-width:1280px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
.filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.filter-lbl{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--color-text-faint);white-space:nowrap;flex-shrink:0;min-width:60px}
.pill{padding:5px 13px;border-radius:var(--radius-full);font-size:.8rem;font-weight:500;border:1.5px solid var(--color-border);background:var(--color-surface-2);color:var(--color-text-muted);cursor:pointer;transition:all var(--tr);display:flex;align-items:center;gap:5px;white-space:nowrap}
.pill:hover{border-color:var(--color-primary);color:var(--color-primary)}
.pill.active{border-color:var(--color-primary);background:var(--color-primary-hl);color:var(--color-primary);font-weight:600}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pill-count{font-size:.68rem;background:var(--color-surface-offset);padding:1px 6px;border-radius:var(--radius-full);color:var(--color-text-faint)}
.pill.active .pill-count{background:var(--color-primary);color:#fff}
.ver-pill{padding:4px 11px;border-radius:var(--radius-full);font-size:.75rem;font-weight:500;border:1.5px solid var(--color-border);background:var(--color-surface-2);color:var(--color-text-muted);cursor:pointer;transition:all var(--tr);white-space:nowrap}
.ver-pill:hover{border-color:var(--color-text-muted)}
.ver-pill.active{border-color:var(--color-text);background:var(--color-text);color:var(--color-bg)}

/* GRID */
.grid-sec{padding:18px 20px 56px;max-width:1280px;margin:0 auto}
.grid-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.grid-title{font-size:.9375rem;font-weight:600}
.grid-sub{font-size:.8rem;color:var(--color-text-muted)}
.sort-sel{padding:6px 10px;border-radius:var(--radius-md);border:1px solid var(--color-border);background:var(--color-surface);font-size:.8rem;color:var(--color-text-muted);cursor:pointer;outline:none}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(340px,100%),1fr));gap:15px}

/* CARD */
.card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:18px;display:flex;flex-direction:column;gap:11px;position:relative;overflow:hidden;transition:box-shadow var(--tr),transform var(--tr),border-color var(--tr)}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3.5px;background:var(--cc,var(--color-primary));border-radius:3px 0 0 3px}
.card:hover{box-shadow:0 6px 24px var(--shadow-md);transform:translateY(-2px);border-color:var(--color-divider)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-name-wrap{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.card-name{font-size:1rem;font-weight:700;letter-spacing:-.01em;font-family:var(--font-code)}
.cat-badge{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:2px 8px;border-radius:var(--radius-full);background:var(--cb,var(--color-primary-hl));color:var(--cc,var(--color-primary))}
.copy-btn{flex-shrink:0;width:30px;height:30px;border-radius:var(--radius-md);background:var(--color-surface-offset);border:1px solid var(--color-border);display:flex;align-items:center;justify-content:center;color:var(--color-text-muted);transition:all var(--tr);position:relative}
.copy-btn:hover{background:var(--color-primary);color:#fff;border-color:var(--color-primary)}
.copy-btn.copied{background:var(--color-success-bg);color:var(--color-success);border-color:var(--color-success)}
.copy-tip{position:absolute;top:-30px;left:50%;transform:translateX(-50%);background:var(--color-text);color:var(--color-bg);font-size:.65rem;font-weight:500;padding:2px 7px;border-radius:var(--radius-sm);white-space:nowrap;pointer-events:none;opacity:0;transition:opacity var(--tr)}
.copy-btn:hover .copy-tip,.copy-btn.copied .copy-tip{opacity:1}
.syntax{font-family:var(--font-code);font-size:.7875rem;background:var(--color-surface-offset);border:1px solid var(--color-border);padding:7px 11px;border-radius:var(--radius-md);color:var(--color-primary);line-height:1.55;word-break:break-all}
.desc{font-size:.875rem;color:var(--color-text-muted);line-height:1.6}
.ex-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--color-text-faint);margin-bottom:3px}
.ex-val{font-family:var(--font-code);font-size:.775rem;color:var(--color-teal);background:var(--color-teal-bg);padding:6px 10px;border-radius:var(--radius-sm);word-break:break-all}
.card-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-top:2px}
.ver-badge{font-size:.675rem;font-weight:600;padding:3px 9px;border-radius:var(--radius-full)}
.v-all{background:#e2e8f0;color:#334155}.v-07{background:#ffedd5;color:#c2410c}
.v-13{background:#dcfce7;color:#166534}.v-16{background:#fef3c7;color:#92400e}
.v-19{background:#fce7f3;color:#9d174d}.v-21{background:#ede9fe;color:#6d28d9}
.v-365{background:#dbeafe;color:#1d4ed8}
[data-theme="dark"] .v-all{background:#1e293b;color:#94a3b8}
[data-theme="dark"] .v-07{background:#431407;color:#fdba74}
[data-theme="dark"] .v-13{background:#14532d;color:#86efac}
[data-theme="dark"] .v-16{background:#451a03;color:#fcd34d}
[data-theme="dark"] .v-19{background:#500724;color:#f9a8d4}
[data-theme="dark"] .v-21{background:#2e1065;color:#c4b5fd}
[data-theme="dark"] .v-365{background:#1e3a5f;color:#93c5fd}
.no-res{grid-column:1/-1;text-align:center;padding:56px 20px;color:var(--color-text-muted)}
.no-res-icon{font-size:2.8rem;margin-bottom:10px}
.no-res h3{font-size:1.1rem;font-weight:600;color:var(--color-text);margin-bottom:5px}

@media(max-width:640px){
  .logo-txt{display:none}
  .hero{padding:22px 14px}
  .hero-stats{gap:18px}
  .filters-wrap{top:56px}
  .filter-lbl{min-width:auto}
  .grid-sec,.filters-inner{padding-left:12px;padding-right:12px}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-inner">
    <a class="logo" href="#">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/>
        </svg>
      </div>
      <span class="logo-txt">Excel<span>Formula</span> Book</span>
    </a>
    <div class="srch-wrap">
      <svg class="srch-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="srch-input" type="search" id="searchInput" placeholder="Search formula name, syntax or description…" autocomplete="off">
    </div>
    <div class="hdr-right">
      <span class="cnt-badge" id="resultCount">30 Formulas</span>
      <button class="theme-btn" id="themeBtn" aria-label="Toggle theme">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
    </div>
  </div>
</header>

<section class="hero">
  <h1>📊 Excel Formula Reference Book</h1>
  <p>Complete guide to Excel formulas — syntax, examples, explanations &amp; Office version support. Search, filter &amp; copy instantly.</p>
  <div class="hero-stats">
    <div><span class="stat-num" id="totalCount">30</span><span class="stat-lbl">Formulas</span></div>
    <div><span class="stat-num" id="categoryCount">8</span><span class="stat-lbl">Categories</span></div>
    <div><span class="stat-num" id="versionCount">7</span><span class="stat-lbl">Versions</span></div>
    <div><span class="stat-num">1-Click</span><span class="stat-lbl">Copy</span></div>
  </div>
</section>

<div class="filters-wrap">
  <div class="filters-inner">
    <div class="filter-row"><span class="filter-lbl">📁 Category</span><div id="catFilters" style="display:flex;flex-wrap:wrap;gap:7px"></div></div>
    <div class="filter-row"><span class="filter-lbl">🗓 Version</span><div id="verFilters" style="display:flex;flex-wrap:wrap;gap:6px"></div></div>
  </div>
</div>

<div class="grid-sec">
  <div class="grid-hdr">
    <div><div class="grid-title" id="gridTitle">All Formulas</div><div class="grid-sub" id="gridSub">Showing 30 of 30 formulas</div></div>
    <select class="sort-sel" id="sortSel">
      <option value="default">Sort: Default</option>
      <option value="az">A → Z</option>
      <option value="za">Z → A</option>
      <option value="cat">By Category</option>
    </select>
  </div>
  <div class="grid" id="grid"></div>
</div>

<script>
const FORMULAS = [
  {
    "name": "SUM",
    "cat": "Math & Trig",
    "syntax": "SUM(number1, [number2], ...)",
    "desc": "Adds values from cells, ranges, or constants to return a total.",
    "ex": "=SUM(A1:A10) → Total of A1:A10",
    "ver": "All Versions"
  },
  {
    "name": "SUMIF",
    "cat": "Math & Trig",
    "syntax": "SUMIF(range, criteria, [sum_range])",
    "desc": "Adds values that meet one condition.",
    "ex": "=SUMIF(B2:B10, \"Apples\", C2:C10) → Sum for Apples",
    "ver": "All Versions"
  },
  {
    "name": "SUMIFS",
    "cat": "Math & Trig",
    "syntax": "SUMIFS(sum_range, criteria_range1, criteria1, ...)",
    "desc": "Adds values that meet multiple conditions.",
    "ex": "=SUMIFS(C2:C10, B2:B10, \"Apples\", D2:D10, \">100\")",
    "ver": "Excel 2007+"
  },
  {
    "name": "ROUND",
    "cat": "Math & Trig",
    "syntax": "ROUND(number, num_digits)",
    "desc": "Rounds a number to the requested decimal place.",
    "ex": "=ROUND(3.14159, 2) → 3.14",
    "ver": "All Versions"
  },
  {
    "name": "ABS",
    "cat": "Math & Trig",
    "syntax": "ABS(number)",
    "desc": "Returns the absolute value of a number.",
    "ex": "=ABS(-42) → 42",
    "ver": "All Versions"
  },
  {
    "name": "MOD",
    "cat": "Math & Trig",
    "syntax": "MOD(number, divisor)",
    "desc": "Returns the remainder after division.",
    "ex": "=MOD(10, 3) → 1",
    "ver": "All Versions"
  },
  {
    "name": "PRODUCT",
    "cat": "Math & Trig",
    "syntax": "PRODUCT(number1, [number2], ...)",
    "desc": "Multiplies the supplied numbers or ranges together.",
    "ex": "=PRODUCT(A1:A3) → A1×A2×A3",
    "ver": "All Versions"
  },
  {
    "name": "ROUNDUP",
    "cat": "Math & Trig",
    "syntax": "ROUNDUP(number, num_digits)",
    "desc": "Rounds a number away from zero.",
    "ex": "=ROUNDUP(12.341, 2) → 12.35",
    "ver": "All Versions"
  },
  {
    "name": "ROUNDDOWN",
    "cat": "Math & Trig",
    "syntax": "ROUNDDOWN(number, num_digits)",
    "desc": "Rounds a number toward zero.",
    "ex": "=ROUNDDOWN(12.349, 2) → 12.34",
    "ver": "All Versions"
  },
  {
    "name": "INT",
    "cat": "Math & Trig",
    "syntax": "INT(number)",
    "desc": "Rounds a number down to the nearest integer.",
    "ex": "=INT(8.9) → 8",
    "ver": "All Versions"
  },
  {
    "name": "CEILING",
    "cat": "Math & Trig",
    "syntax": "CEILING(number, significance)",
    "desc": "Rounds a number up to the nearest multiple of significance.",
    "ex": "=CEILING(27, 5) → 30",
    "ver": "All Versions"
  },
  {
    "name": "FLOOR",
    "cat": "Math & Trig",
    "syntax": "FLOOR(number, significance)",
    "desc": "Rounds a number down to the nearest multiple of significance.",
    "ex": "=FLOOR(27, 5) → 25",
    "ver": "All Versions"
  },
  {
    "name": "POWER",
    "cat": "Math & Trig",
    "syntax": "POWER(number, power)",
    "desc": "Raises a number to a power.",
    "ex": "=POWER(5, 3) → 125",
    "ver": "All Versions"
  },
  {
    "name": "SQRT",
    "cat": "Math & Trig",
    "syntax": "SQRT(number)",
    "desc": "Returns the square root of a positive number.",
    "ex": "=SQRT(144) → 12",
    "ver": "All Versions"
  },
  {
    "name": "RAND",
    "cat": "Math & Trig",
    "syntax": "RAND()",
    "desc": "Returns a random decimal between 0 and 1.",
    "ex": "=RAND() → 0.527...",
    "ver": "All Versions"
  },
  {
    "name": "RANDBETWEEN",
    "cat": "Math & Trig",
    "syntax": "RANDBETWEEN(bottom, top)",
    "desc": "Returns a random integer between the specified bounds.",
    "ex": "=RANDBETWEEN(1, 100) → Random whole number",
    "ver": "All Versions"
  },
  {
    "name": "SUBTOTAL",
    "cat": "Math & Trig",
    "syntax": "SUBTOTAL(function_num, ref1, [ref2], ...)",
    "desc": "Calculates a subtotal and can ignore filtered or hidden rows.",
    "ex": "=SUBTOTAL(9, C2:C20) → Visible-row sum",
    "ver": "All Versions"
  },
  {
    "name": "SUMPRODUCT",
    "cat": "Math & Trig",
    "syntax": "SUMPRODUCT(array1, [array2], ...)",
    "desc": "Multiplies matching components in arrays and adds the results.",
    "ex": "=SUMPRODUCT(B2:B6, C2:C6) → Weighted total",
    "ver": "All Versions"
  },
  {
    "name": "AVERAGE",
    "cat": "Statistical",
    "syntax": "AVERAGE(number1, [number2], ...)",
    "desc": "Returns the arithmetic mean of the supplied values.",
    "ex": "=AVERAGE(B2:B20) → Mean of B2:B20",
    "ver": "All Versions"
  },
  {
    "name": "AVERAGEIF",
    "cat": "Statistical",
    "syntax": "AVERAGEIF(range, criteria, [average_range])",
    "desc": "Returns the average of cells that meet one condition.",
    "ex": "=AVERAGEIF(A2:A10, \">50\", B2:B10)",
    "ver": "Excel 2007+"
  },
  {
    "name": "AVERAGEIFS",
    "cat": "Statistical",
    "syntax": "AVERAGEIFS(average_range, criteria_range1, criteria1, ...)",
    "desc": "Returns the average of cells that satisfy multiple conditions.",
    "ex": "=AVERAGEIFS(C2:C10, A2:A10, \"North\", B2:B10, \">100\")",
    "ver": "Excel 2007+"
  },
  {
    "name": "COUNT",
    "cat": "Statistical",
    "syntax": "COUNT(value1, [value2], ...)",
    "desc": "Counts numeric cells and numeric values.",
    "ex": "=COUNT(A1:A20) → Number of numeric cells",
    "ver": "All Versions"
  },
  {
    "name": "COUNTA",
    "cat": "Statistical",
    "syntax": "COUNTA(value1, [value2], ...)",
    "desc": "Counts non-empty cells of any type.",
    "ex": "=COUNTA(A1:A20) → Filled cells count",
    "ver": "All Versions"
  },
  {
    "name": "COUNTBLANK",
    "cat": "Statistical",
    "syntax": "COUNTBLANK(range)",
    "desc": "Counts empty cells in a range.",
    "ex": "=COUNTBLANK(A1:A20) → Blank cells count",
    "ver": "All Versions"
  },
  {
    "name": "COUNTIF",
    "cat": "Statistical",
    "syntax": "COUNTIF(range, criteria)",
    "desc": "Counts cells that meet one condition.",
    "ex": "=COUNTIF(A1:A50, \"Pass\") → Count of Pass",
    "ver": "All Versions"
  },
  {
    "name": "COUNTIFS",
    "cat": "Statistical",
    "syntax": "COUNTIFS(criteria_range1, criteria1, ...)",
    "desc": "Counts cells that meet multiple conditions.",
    "ex": "=COUNTIFS(A2:A10, \"Male\", B2:B10, \">30\")",
    "ver": "Excel 2007+"
  },
  {
    "name": "MAX",
    "cat": "Statistical",
    "syntax": "MAX(number1, [number2], ...)",
    "desc": "Returns the largest number in a set.",
    "ex": "=MAX(C1:C100) → Highest value",
    "ver": "All Versions"
  },
  {

    "ver": "All Versions"
  },
  {
    "name": "ISERROR",
    "cat": "Information",
    "syntax": "ISERROR(value)",
    "desc": "Returns TRUE for any Excel error value.",
    "ex": "=ISERROR(A2/B2)",
    "ver": "All Versions"
  },
  {
    "name": "ISERR",
    "cat": "Information",
    "syntax": "ISERR(value)",
    "desc": "Returns TRUE for any error except #N/A.",
    "ex": "=ISERR(A2/B2)",
    "ver": "All Versions"
  },
  {
    "name": "ISNA",
    "cat": "Information",
    "syntax": "ISNA(value)",
    "desc": "Returns TRUE when the value is #N/A.",
    "ex": "=ISNA(VLOOKUP(E2, A:B, 2, FALSE))",
    "ver": "All Versions"
  },
  {
    "name": "ERROR.TYPE",
    "cat": "Information",
    "syntax": "ERROR.TYPE(error_val)",
    "desc": "Returns a number representing an Excel error type.",
    "ex": "=ERROR.TYPE(#DIV/0!) → 2",
    "ver": "All Versions"
  },
  {
    "name": "TYPE",
    "cat": "Information",
    "syntax": "TYPE(value)",
    "desc": "Returns a number indicating the data type of a value.",
    "ex": "=TYPE(A2) → 1 for number",
    "ver": "All Versions"
  },
  {
    "name": "N",
    "cat": "Information",
    "syntax": "N(value)",
    "desc": "Converts a value to a number where possible.",
    "ex": "=N(TRUE) → 1",
    "ver": "All Versions"
  },
  {
    "name": "PMT",
    "cat": "Financial",
    "syntax": "PMT(rate, nper, pv, [fv], [type])",
    "desc": "Calculates the periodic payment for a loan or annuity.",
    "ex": "=PMT(5%/12, 60, -25000)",
    "ver": "All Versions"
  },
  {
    "name": "PV",
    "cat": "Financial",
    "syntax": "PV(rate, nper, pmt, [fv], [type])",
    "desc": "Returns the present value of an investment or loan.",
    "ex": "=PV(6%/12, 36, -400)",
    "ver": "All Versions"
  },
  {
    "name": "FV",
    "cat": "Financial",
    "syntax": "FV(rate, nper, pmt, [pv], [type])",
    "desc": "Returns the future value of an investment.",
    "ex": "=FV(6%/12, 120, -200, 0)",
    "ver": "All Versions"
  },
  {
    "name": "NPV",
    "cat": "Financial",
    "syntax": "NPV(rate, value1, [value2], ...)",
    "desc": "Calculates net present value using periodic cash flows.",
    "ex": "=NPV(10%, B2:B8) + B1",
    "ver": "All Versions"
  },
  {
    "name": "IRR",
    "cat": "Financial",
    "syntax": "IRR(values, [guess])",
    "desc": "Returns the internal rate of return for a series of cash flows.",
    "ex": "=IRR(B2:B8)",
    "ver": "All Versions"
  },
  {
    "name": "RATE",
    "cat": "Financial",
    "syntax": "RATE(nper, pmt, pv, [fv], [type], [guess])",
    "desc": "Returns the interest rate per period for an annuity.",
    "ex": "=RATE(36, -400, 12000)",
    "ver": "All Versions"
  },
  {
    "name": "NPER",
    "cat": "Financial",
    "syntax": "NPER(rate, pmt, pv, [fv], [type])",
    "desc": "Returns the number of periods for an investment or loan.",
    "ex": "=NPER(6%/12, -200, 10000)",
    "ver": "All Versions"
  },
  {
    "name": "IPMT",
    "cat": "Financial",
    "syntax": "IPMT(rate, per, nper, pv, [fv], [type])",
    "desc": "Returns the interest portion of a payment for a given period.",
    "ex": "=IPMT(5%/12, 1, 60, 25000)",
    "ver": "All Versions"
  },
  {
    "name": "PPMT",
    "cat": "Financial",
    "syntax": "PPMT(rate, per, nper, pv, [fv], [type])",
    "desc": "Returns the principal portion of a payment for a given period.",
    "ex": "=PPMT(5%/12, 1, 60, 25000)",
    "ver": "All Versions"
  },
  {
    "name": "XNPV",
    "cat": "Financial",
    "syntax": "XNPV(rate, values, dates)",
    "desc": "Calculates net present value using irregular cash-flow dates.",
    "ex": "=XNPV(10%, B2:B8, A2:A8)",
    "ver": "All Versions"
  },
  {
    "name": "XIRR",
    "cat": "Financial",
    "syntax": "XIRR(values, dates, [guess])",
    "desc": "Returns the internal rate of return for irregular cash flows.",
    "ex": "=XIRR(B2:B8, A2:A8)",
    "ver": "All Versions"
  },
  {
    "name": "SLN",
    "cat": "Financial",
    "syntax": "SLN(cost, salvage, life)",
    "desc": "Returns straight-line depreciation for one period.",
    "ex": "=SLN(12000, 2000, 5)",
    "ver": "All Versions"
  },
  {
    "name": "SYD",
    "cat": "Financial",
    "syntax": "SYD(cost, salvage, life, per)",
    "desc": "Returns sum-of-years-digits depreciation for a period.",
    "ex": "=SYD(12000, 2000, 5, 1)",
    "ver": "All Versions"
  }
];

const CAT_CFG = {
  'All': {cc:'#1d6fa4', cb:'#dbeafe', dot:'#3b82f6'},
  'Math & Trig': {cc:'#166534', cb:'#dcfce7', dot:'#16a34a'},
  'Statistical': {cc:'#6d28d9', cb:'#ede9fe', dot:'#7c3aed'},
  'Text': {cc:'#c2410c', cb:'#ffedd5', dot:'#ea580c'},
  'Logical': {cc:'#0f766e', cb:'#ccfbf1', dot:'#0d9488'},
  'Lookup & Reference': {cc:'#1d4ed8', cb:'#dbeafe', dot:'#3b82f6'},
  'Date & Time': {cc:'#9d174d', cb:'#fce7f3', dot:'#ec4899'},
  'Information': {cc:'#92400e', cb:'#fef3c7', dot:'#f59e0b'},
  'Financial': {cc:'#7c2d12', cb:'#ffedd5', dot:'#f97316'},
};
const VER_CLS = {'All Versions':'v-all','Excel 2007+':'v-07','Excel 2013+':'v-13','Excel 2016+':'v-16','Excel 2019+':'v-19','Excel 2021+':'v-21','Excel 365':'v-365'};
const VER_ICO = {'All':'📋','All Versions':'📋','Excel 2007+':'🟠','Excel 2013+':'🟢','Excel 2016+':'🟡','Excel 2019+':'🩷','Excel 2021+':'🟣','Excel 365':'⭐'};
const VERSIONS = ['All', 'All Versions', 'Excel 2007+', 'Excel 2013+', 'Excel 2016+', 'Excel 2019+', 'Excel 2021+', 'Excel 365'];
const META = {
  total: FORMULAS.length,
  categories: new Set(FORMULAS.map((formula) => formula.cat)).size,
  versions: new Set(FORMULAS.map((formula) => formula.ver)).size,
};
const THEME_KEY = 'excel-formula-book-theme';

let activeCat = 'All';
let activeVer = 'All';
let query = '';
let sort = 'default';

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, (char) => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;',
  })[char]);
}

function updateHeroStats() {
  document.getElementById('totalCount').textContent = META.total;
  document.getElementById('categoryCount').textContent = META.categories;
  document.getElementById('versionCount').textContent = META.versions;
}

function init() {
  updateHeroStats();
  renderCats();
  renderVers();
  initTheme();
  renderGrid();
}

function renderCats() {
  const cats = ['All', ...Object.keys(CAT_CFG).filter((cat) => cat !== 'All' && FORMULAS.some((formula) => formula.cat === cat))];
  const el = document.getElementById('catFilters');
  el.innerHTML = '';
  cats.forEach((cat) => {
    const count = cat === 'All' ? FORMULAS.length : FORMULAS.filter((formula) => formula.cat === cat).length;
    const cfg = CAT_CFG[cat] || CAT_CFG.All;
    const button = document.createElement('button');
    button.className = 'pill' + (cat === activeCat ? ' active' : '');
    button.innerHTML = `<span class="dot" style="background:${cfg.dot}"></span>${escapeHtml(cat)}<span class="pill-count">${count}</span>`;
    button.onclick = () => {
      activeCat = cat;
      renderCats();
      renderGrid();
    };
    el.appendChild(button);
  });
}

function renderVers() {
  const el = document.getElementById('verFilters');
  el.innerHTML = '';
  VERSIONS.filter((version) => version === 'All' || FORMULAS.some((formula) => formula.ver === version)).forEach((version) => {
    const button = document.createElement('button');
    button.className = 'ver-pill' + (version === activeVer ? ' active' : '');
    button.textContent = `${VER_ICO[version] || '📋'} ${version}`;
    button.onclick = () => {
      activeVer = version;
      renderVers();
      renderGrid();
    };
    el.appendChild(button);
  });
}

function filtered() {
  let list = [...FORMULAS];
  if (activeCat !== 'All') list = list.filter((formula) => formula.cat === activeCat);
  if (activeVer !== 'All') list = list.filter((formula) => formula.ver === activeVer);
  if (query) {
    const q = query.toLowerCase();
    list = list.filter((formula) => [formula.name, formula.syntax, formula.desc, formula.ex, formula.cat, formula.ver].some((value) => value.toLowerCase().includes(q)));
  }
  if (sort === 'az') list.sort((a, b) => a.name.localeCompare(b.name));
  else if (sort === 'za') list.sort((a, b) => b.name.localeCompare(a.name));
  else if (sort === 'cat') list.sort((a, b) => a.cat.localeCompare(b.cat) || a.name.localeCompare(b.name));
  return list;
}

function renderGrid() {
  const list = filtered();
  document.getElementById('resultCount').textContent = `${list.length} Formulas`;
  document.getElementById('gridTitle').textContent = activeCat === 'All' ? 'All Formulas' : `${activeCat} Formulas`;
  document.getElementById('gridSub').textContent = `Showing ${list.length} of ${FORMULAS.length} formulas`;
  const grid = document.getElementById('grid');
  if (!list.length) {
    grid.innerHTML = '<div class="no-res"><div class="no-res-icon">🔍</div><h3>No formulas found</h3><p>Try different keywords or reset filters</p></div>';
    return;
  }
  grid.innerHTML = list.map((formula, index) => {
    const cfg = CAT_CFG[formula.cat] || CAT_CFG.All;
    const versionClass = VER_CLS[formula.ver] || 'v-all';
    const versionIcon = VER_ICO[formula.ver] || '📋';
    return `<div class="card" style="--cc:${cfg.cc};--cb:${cfg.cb}">
      <div class="card-top">
        <div class="card-name-wrap">
          <span class="card-name">${escapeHtml(formula.name)}</span>
          <span class="cat-badge">${escapeHtml(formula.cat)}</span>
        </div>
        <button class="copy-btn" data-copy-index="${index}" aria-label="Copy formula">
          <span class="copy-tip">Copy</span>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </div>
      <div class="syntax">${escapeHtml(formula.syntax)}</div>
      <div class="desc">${escapeHtml(formula.desc)}</div>
      <div><div class="ex-lbl">Example</div><div class="ex-val">${escapeHtml(formula.ex)}</div></div>
      <div class="card-footer"><span class="ver-badge ${versionClass}">${versionIcon} ${escapeHtml(formula.ver)}</span></div>
    </div>`;
  }).join('');

  grid.querySelectorAll('.copy-btn').forEach((button) => {
    button.addEventListener('click', async () => {
      const formula = list[Number(button.dataset.copyIndex)];
      if (!formula) return;
      try {
        await navigator.clipboard.writeText(`=${formula.syntax}`);
      } catch (error) {
        console.warn('Clipboard copy failed', error);
      }
      const tip = button.querySelector('.copy-tip');
      button.classList.add('copied');
      if (tip) tip.textContent = 'Copied!';
      setTimeout(() => {
        button.classList.remove('copied');
        if (tip) tip.textContent = 'Copy';
      }, 1800);
    });
  });
}

function initTheme() {
  const button = document.getElementById('themeBtn');
  const root = document.documentElement;
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
  const sun = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
  const moon = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';

  const getStoredTheme = () => {
    try {
      const storedTheme = localStorage.getItem(THEME_KEY);
      return storedTheme === 'light' || storedTheme === 'dark' ? storedTheme : '';
    } catch (error) {
      return '';
    }
  };

  const applyTheme = (theme) => {
    root.setAttribute('data-theme', theme);
    button.innerHTML = theme === 'dark' ? sun : moon;
  };

  let theme = getStoredTheme() || (prefersDark.matches ? 'dark' : 'light');
  applyTheme(theme);

  button.addEventListener('click', () => {
    theme = theme === 'dark' ? 'light' : 'dark';
    applyTheme(theme);
    try {
      localStorage.setItem(THEME_KEY, theme);
    } catch (error) {
      console.warn('Theme preference could not be stored', error);
    }
  });

  if (typeof prefersDark.addEventListener === 'function') {
    prefersDark.addEventListener('change', (event) => {
      if (getStoredTheme()) return;
      theme = event.matches ? 'dark' : 'light';
      applyTheme(theme);
    });
  }
}

document.getElementById('searchInput').addEventListener('input', (event) => {
  query = event.target.value.trim();
  renderGrid();
});
document.getElementById('sortSel').addEventListener('change', (event) => {
  sort = event.target.value;
  renderGrid();
});

init();
</script>
</body>
</html>
